<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, red, black);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: red;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Signup</h2>

  <input id="name" type="text" placeholder="Full Name">
  <input id="mobile" type="text" placeholder="Mobile Number">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">REGISTER</button>
</div>

<script>

// 🔥 SUPABASE (APNI DALNA)
const SUPABASE_URL = "https://katbdbzoufiblnnsoxkk.supabase.co";
const SUPABASE_KEY = "sb_publishable_--fdpQMmSlUyt2ywjUErgQ_LXGvQH-a";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔥 SIGNUP FUNCTION
async function signup() {

  let name = document.getElementById("name").value;
  let mobile = document.getElementById("mobile").value;
  let password = document.getElementById("password").value;

  // validation
  if(!name || !mobile || !password){
    alert("Sab fill kar");
    return;
  }

  // insert data
  let { data, error } = await client
    .from("login")
    .insert([
      { name: name, mobile: mobile, password: password, balance: 0 }
    ]);

  if(error){
    alert("Error: " + error.message);
  } else {
    alert("Signup Success ✅");
    window.location.href = "index.html";
  }
}

</script>

</body>
</html>
